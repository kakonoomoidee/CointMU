changelog:
  exclude:
    labels:
      - ignore-for-release
    authors:
      - dependabot
      - github-actions
  categories:
    - title: '🚀 Features'
      labels:
        - feature
        - enhancement
    - title: '🐛 Bug Fixes'
      labels:
        - fix
        - bug
    - title: '🛠 Maintenance'
      labels:
        - refactor
        - chore
        - dependencies
        - docs
