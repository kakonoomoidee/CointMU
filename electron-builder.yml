appId: com.cointmu.desktop
productName: CointMU
icon: resources/icon.png
directories:
  buildResources: build
files:
  - '!**/.vscode/*'
  - '!src/*'
  - '!electron.vite.config.*'
  - '!{.env,.eslintignore,.eslintrc.cjs,.prettierignore,.prettierrc.yaml,dev-app-update.yml,CHANGELOG.md,README.md}'
  - '!{tsconfig.json,tsconfig.node.json,tsconfig.web.json}'
extraResources:
  - from: resources/bin/
    to: bin/
    filter:
      - '**/*'
asarUnpack:
  - resources/**
win:
  executableName: CointMU
  icon: resources/icon.ico
  target:
    - nsis
nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  license: resources/license.txt
  artifactName: CointMU-Setup-${version}.${ext}
  shortcutName: CointMU
  uninstallDisplayName: CointMU Desktop
  createDesktopShortcut: always
mac:
  entitlementsInherit: build/entitlements.mac.plist
  extendInfo:
    - NSDocumentsFolderUsageDescription: CointMU requires access to store blockchain data.
    - NSDownloadsFolderUsageDescription: CointMU requires access to manage downloaded binaries.
  notarize: false
linux:
  icon: resources/icon.png
  target:
    - AppImage
    - deb
  maintainer: cointmu.org
  category: Utility
publish:
  provider: github
  owner: kakonoomoidee
  repo: CointMU
