appId: com.cointmu.desktop
productName: CointMU
icon: resources/icon.png
directories:
  buildResources: build
files:
  - '!**/.vscode/*'
  - '!src/*'
  - '!electron.vite.config.*'
  - '!{.env,.eslintignore,.eslintrc.cjs,.prettierignore,.prettierrc.yaml,dev-app-update.yml,CHANGELOG.md,README.md}'
  - '!{tsconfig.json,tsconfig.node.json,tsconfig.web.json}'
asarUnpack:
  - resources/**
win:
  artifactName: windows-cointmu-desktop-${version}-installer.${ext}
  executableName: CointMU
  icon: resources/icon.ico
  target:
    - nsis
  extraResources:
    - from: resources/bin/win/
      to: bin/win/
      filter:
        - '**/*'
nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  installerIcon: resources/icon.ico
  license: resources/license.txt
  shortcutName: CointMU
  uninstallDisplayName: CointMU Desktop
  createDesktopShortcut: always
mac:
  artifactName: macos-cointmu-desktop-${version}-installer.${ext}
  entitlements: resources/mac/entitlements.mac.plist
  entitlementsInherit: resources/mac/entitlements.mac.inherit.plist
  extendInfo:
    - NSDocumentsFolderUsageDescription: CointMU requires access to store blockchain data.
    - NSDownloadsFolderUsageDescription: CointMU requires access to manage downloaded binaries.
  notarize: false
linux:
  artifactName: linux-cointmu-desktop-${version}-installer.${ext}
  icon: resources/icon.png
  target:
    - AppImage
    - deb
  maintainer: cointmu.org
  category: Utility
  extraResources:
    - from: resources/bin/linux/
      to: bin/linux/
      filter:
        - '**/*'
publish:
  provider: github
  releaseType: release
  owner: kakonoomoidee
  repo: CointMU
  generateReleaseNotes: true
